<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title or "X Content Creation MVP" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" /></noscript>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <header class="topbar">
    <div class="container row between center">
      <div>
        <h1 class="logo">X Content Creation MVP</h1>
        <p class="muted">URL / Text / Image -> Insight -> Style -> English Drafts</p>
      </div>
      <nav class="nav row" aria-label="Main navigation">
        <a href="/" {% if active_nav == 'create' %}aria-current="page"{% endif %}>Create</a>
        <a href="/style" {% if active_nav == 'style' %}aria-current="page"{% endif %}>Style Studio</a>
        <a href="/drafts" {% if active_nav == 'drafts' %}aria-current="page"{% endif %}>Draft Library</a>
      </nav>
    </div>
  </header>

  <main id="main" class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
